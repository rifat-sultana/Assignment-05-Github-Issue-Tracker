<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Github Issue </title>

<!-- tailwind + daisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- Google font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- stylesheet -->
<link rel="stylesheet" href="style.css">
</head>

<body class="min-h-screen max-w-lg bg-white-700 shadow-lg mx-auto mt-10 mb-20"  >
 
<section class="max-w-md mx-auto" >
   <div class="mx-auto" > 
  <img class=" mx-auto my-10 " src="./assets/github-logo.png" alt="github logo">
  <h1 class="text-3xl text-center font-bold mb-2"> Github Issue Tracker </h1>
  <p class="text-[#64748B] font-bold text-center text-[18px]">Sign in to manage your issues</p>
  </div>
</section>

<section class="grid items-center p-5 ">
  <fieldset class="fieldset">
    <legend class="fieldset-legend text-lg font-bold"> Username </legend>
    <input id="input-username" type="text" class="input text-md text-[#71717A]  w-full rounded-lg" placeholder="Enter Username" />
    <p class="label text-[#4A00FF] text-md">Default: admin</p>
  </fieldset>

  <fieldset class="fieldset">
    <legend class="fieldset-legend text-lg font-bold"> Password </legend>
    <input id="input-password" type="password" class="input text-md text-[#71717A] w-full rounded-lg"  placeholder="Enter Password" />
    <p class="label text-[#4A00FF] text-md">Default: admin123</p>
  </fieldset>

<button id="signin-btn" class="btn btn-primary mt-4 p-6 text-xl rounded-lg">Sign In</button>

</section>

<div class="flex items-center my-6">
  <div class="flex-1 border-t border-gray-300"></div>

  <span class="mx-4 text-gray-500">OR</span>

  <div class="flex-1 border-t border-gray-300"></div>
</div>

<section>
      <p class="text-center text-gray-500 mb-3">
         Demo Credentials:
      </p>

   <div class="bg-gray-100 rounded-lg p-4 mx-5 text-center">
      <p> <span class="font-bold">  Username:</span> admin </p>
      <p> <span class="font-bold"> Password:</span> admin123</p>
    </div>
 </section>





 <script src="./script/signin.js"></script>


</body>
</html>
