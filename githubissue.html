<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>  Github Page </title>

<!-- Tailwind+ daisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>

<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<style>
     *{
          font-family: "Geist", sans-serif;
     }
</style>
</head>

<body class="bg-gray-50 min-h-screen">
 
<section>

  <navbar> 
  <div class="bg-white flex items-center justify-between px-6 py-4 border-2 shadow-md">

    <!-- left side (logo + title) -->
    <div class="flex items-center gap-3">
      <img src="./assets/github-logo.png" class="w-10" alt="github-logo">
      <h3 class="text-xl font-bold">GitHub Issues Tracker</h3>
    </div>

    <!-- right side -->
    <div class="join">

      <label class="input input-bordered join-item flex items-center gap-2">
        <input type="text" class="grow" placeholder="Search issues..." />
      </label>

      <button class="btn btn-primary join-item">
        + New Issue
      </button>

    </div>

  </div>
</navbar>
</section>

<main class=" bg-gray-50  max-w-6xl mx-auto px-6 py-10 ">

  <section> 
  <div class=" flex flex-col gap-8"> 
  <div class="bg-white rounded-md shadow p-4 ">
    <button onclick="loadAll()" class="tab-btn px-7 py-2 text-[14px] text-[#64748B] bg-gray-50   rounded-md shadow"> All</button>
    <button onclick="showOpen()" class="tab-btn px-7 py-2 text-[14px] text-[#64748B] bg-gray-50  rounded-md shadow"> Open</button>
    <button onclick="showClosed()" class="tab-btn px-7 py-2 text-[14px] text-[#64748B] bg-gray-50  rounded-md shadow"> Closed</button>
  </div>
  </div>
</section>


<section> 
   
<div class="bg-white flex justify-between items-center rounded-md shadow mt-4 p-6">

  <!-- <!-- LEFT SIDE -- -->

  <div class="flex items-center gap-3">
    <img src="./assets/Aperture.png" class="w-10" alt="Aperture">

    <div>
      <h1 class="font-bold text-lg">50 issues</h1>
      <p class="text-[#64748B] text-sm">
        Track and manage your project issues
      </p>
    </div>
  </div>


  <!-- RIGHT SIDE -->

  <div class="flex gap-4 text-sm">

    <div class="flex items-center gap-2">
      <span class="w-2 h-2 bg-green-600 rounded-full"></span>
      <span>Open</span>
    </div>

    <div class="flex items-center gap-2">
      <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
      <span>Closed</span>
    </div>

  </div>

</div>

</section>


<!-- issue card grid -->
<div id="issue-container" class="grid grid-cols-4 gap-6 mt-6">

</div>


</main>

<script src="./script/github.js"> </script>
<script src="./script/signin.js"></script>  

</body> 

</html>
