<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>  Github Page </title>

<!-- Tailwind+ daisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>

<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

<!-- font awesome -->
<link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>
     *{
          font-family: "Geist", sans-serif;
     }
</style>
</head>

<body class="bg-gray-50 min-h-screen">
 
<section>

  <navbar> 
  <div class="bg-white flex items-center justify-between px-6 py-4 border-2 shadow-md">

    <!-- left side (logo + title) -->
    <div class="flex items-center gap-3">
      <img src="./assets/github-logo.png" class="w-10" alt="github-logo">
      <h3 class="text-xl font-bold">GitHub Issues Tracker</h3>
    </div>

    <!-- right side -->
  <div class="join">

        <label class="input input-bordered input-sm join-item flex items-center gap-2"><i class="fas fa-magnifying-glass"></i>
        <input id="search-input" type="text" placeholder="Search issues..." class="grow text-sm"/>
        </label>

     <button id="search-btn" class="btn btn-primary btn-sm join-item">
        Search
      </button>

</div>

  </div>
</navbar>
</section>

<main class=" bg-gray-50  max-w-6xl mx-auto px-6 py-10 ">

 <section> 
  <div class=" flex flex-col gap-8"> 

    <div class="bg-white rounded-md shadow p-4 flex gap-3 ">

    <button onclick="loadAll()" class="bg-indigo-100 tab-btn px-7 py-2 text-[14px] text-[#64748B] font-bold rounded-md shadow"> All</button>

    <button onclick="showOpen()" class="bg-indigo-100 tab-btn px-7 py-2 text-[14px] text-[#64748B] font-bold rounded-md shadow"> Open</button>

    <button onclick="showClosed()" class="bg-indigo-100  tab-btn px-7 py-2 text-[14px] text-[#64748B] font-bold rounded-md shadow"> Closed</button>

    </div>

  </div>
 </section>


<section> 
   
<div class="bg-white flex justify-between items-center rounded-md shadow mt-4 p-6">

  <!-- <!-- LEFT SIDE -- -->

  <div class="flex items-center gap-3">
    <img src="./assets/Aperture.png" class="w-10" alt="Aperture">

    <div>
      <h1 id="issue-count" class="font-bold text-lg"> 50 Issues</h1>
      <p class="text-[#64748B] text-sm">
        Track and manage your project issues
      </p>
    </div>
  </div>


  <!-- RIGHT SIDE -->

  <div class="flex gap-4 text-sm">

    <div class="flex items-center gap-2">
      <span class="w-2 h-2 bg-green-600 rounded-full"></span>
      <span>Open</span>
    </div>

    <div class="flex items-center gap-2">
      <span class="w-2 h-2 bg-purple-500 rounded-full"></span>
      <span>Closed</span>
    </div>

  </div>

</div>

</section>


  <!-- spinner -->
    <div id="loading-spinner" class="hidden flex justify-center my-6">
      <span class="loading loading-spinner loading-xl"> </span> 
    </div>

<!-- issue card  -->
<div id="issues-container" class="grid grid-cols-4 gap-3 mt-6"> </div>

 <!-- Modal -->

     <div id="issue-modal"
        class="fixed inset-0 bg-black bg-opacity-40 hidden flex justify-center items-center">

     <div class="bg-white w-[600px] rounded-lg p-6">

       <h2 id="modal-title" class="text-xl font-bold mb-2"></h2>

        <div class="flex items-center gap-3 mb-3">

          <span id="modal-status"
          class="px-3 py-1 text-sm rounded-full text-white"></span>

            <p class="text-sm text-gray-500">
            Opened by <span id="modal-author"></span>
            • <span id="modal-date"></span>
            </p>

        </div>
         
      <div id="modal-labels" class="flex gap-2 mb-3"></div>
      <p id="modal-description" class="text-gray-700 mb-4"></p>

     <div class="flex justify-between bg-gray-100 p-4 rounded">

     <div>
    <p class="text-sm text-gray-500"> Assignee </p>

    <p id="modal-assignee" class="font-bold"></p>

 </div>

    <div>
    <p class="text-sm text-gray-500">Priority</p>
     <span id="modal-priority" class="px-3 py-1 rounded text-white"></span>
    </div>

 </div>

    <button onclick="closeModal()"
    class="bg-purple-600 text-white px-4 py-2  rounded mt-5">
    Close
   </button>

  </div>
</div>


</main>

<script src="./script/github.js"> </script>
  

</body> 

</html>
